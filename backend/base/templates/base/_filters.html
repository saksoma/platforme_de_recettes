{% load static %}
<aside class="card p-3 sticky-top" style="top:1rem">
  <form method="get">
    {% csrf_token %}

    <h6 class="mb-2">Catégories</h6>
    <div class="mb-3">
      {% for category in categories %}
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="category" value="{{ category.id }}" id="cat{{ category.id }}">
          <label class="form-check-label" for="cat{{ category.id }}">{{ category.name }} <span class="text-muted">({{ category.count }})</span></label>
        </div>
      {% endfor %}
    </div>

    <h6 class="mb-2">Temps de préparation</h6>
    <div class="mb-3">
      <div class="form-check">
        <input class="form-check-input" type="radio" name="prep_time" value="0-15" id="t1" {% if request.GET.prep_time == '0-15' %}checked{% endif %}>
        <label class="form-check-label" for="t1">Moins de 15 min</label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="radio" name="prep_time" value="15-30" id="t2" {% if request.GET.prep_time == '15-30' %}checked{% endif %}>
        <label class="form-check-label" for="t2">15 - 30 min</label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="radio" name="prep_time" value=">30" id="t3" {% if request.GET.prep_time == '>30' %}checked{% endif %}>
        <label class="form-check-label" for="t3">Plus de 30 min</label>
      </div>
    </div>

    <h6 class="mb-2">Difficulté</h6>
    <div class="mb-3">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" name="difficulty" value="easy" id="d1">
        <label class="form-check-label" for="d1">Facile</label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="checkbox" name="difficulty" value="medium" id="d2">
        <label class="form-check-label" for="d2">Moyen</label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="checkbox" name="difficulty" value="hard" id="d3">
        <label class="form-check-label" for="d3">Difficile</label>
      </div>
    </div>

    <h6 class="mb-2">Tags</h6>
    <div class="mb-3">
      {% for tag in tags %}
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="tags" value="{{ tag.id }}" id="tag{{ tag.id }}">
          <label class="form-check-label" for="tag{{ tag.id }}">{{ tag.name }}</label>
        </div>
      {% endfor %}
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-success">Filtrer</button>
      <a href="?" class="btn btn-outline-secondary">Réinitialiser</a>
    </div>
  </form>
</aside>
